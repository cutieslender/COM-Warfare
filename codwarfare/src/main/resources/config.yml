# Persistance des choix d'armure (classe/perk/primary/secondary).
# - local: utilise loadouts.yml sur le serveur
# - mysql: utilise une table MySQL dédiée `cod_loadouts` (shared entre serveurs)
loadout-storage:
  type: "mysql" # local, mysql
  mysql:
    enabled: true
    host: "localhost"
    port: 3306
    database: "minecraft"
    username: "invit"
    password: ""
    pool-size: 5
