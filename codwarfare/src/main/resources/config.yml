debug: false

arena: "default"

# Integrations reseau / mondes (Multiverse-Core = optionnel, softdepend).
# HubCore lui-meme ne tourne en general pas sur le serveur minijeux : les stats passent par HubCore-BridgeSpigot.
integrations:
  multiverse:
    # Si Bukkit.getWorld(name) echoue, tente Multiverse-Core (alias / nom MV).
    resolve-worlds: true
    warn-missing-world: true
  bridge:
    # Envoie kills+deaths au proxy via BridgeSyncAPI (meme logique que BrainFFA : sendKill / sendDeath).
    sync-stats: true

game:
  mode: "tdm" # tdm, ffa, infect, ctf
  players-per-team: 4
  max-teams: 2
  kills-to-win: 50
  start-countdown-seconds: 10
  respawn-delay-ticks: 40
  void-y: -64.0
  headshot-multiplier: 1.6
  # Distance max (en blocs) entre le projectile et les yeux de la victime.
  # Plus c'est petit, plus le headshot est difficile à valider.
  headshot-distance: 0.9
  ffa:
    min-players: 4
  ctf:
    captures-to-win: 3
    flag-respawn-delay-ticks: 600 # 30s
  infect:
    survivor-kills-to-win: 30

queue:
  auto-start: true

